<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Order Juices | A Taste of Jade</title>

    <style>

        /* =========================================
           A TASTE OF JADE - JUICE ORDER PAGE
        ========================================= */

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f8f5ec;
            color: #244d2c;
        }

        .page {
            width: 92%;
            max-width: 850px;
            margin: auto;
            padding: 25px 0 70px;
        }


        /* =========================================
           HEADER
        ========================================= */

        .top {
            text-align: center;
            padding: 15px 15px 30px;
        }

        .small-logo {
            width: 105px;
            max-width: 35%;
            height: auto;
            display: block;
            margin: 0 auto 12px;
        }

        .top h1 {
            font-size: 38px;
            margin: 10px 0;
            color: #244d2c;
        }

        .top p {
            color: #677560;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .back-link {
            display: inline-block;
            margin-top: 10px;
            color: #244d2c;
            font-weight: bold;
            text-decoration: none;
        }


        /* =========================================
           WEEKLY NOTICE
        ========================================= */

        .notice {
            background: #244d2c;
            color: white;
            padding: 22px;
            border-radius: 22px;
            margin-bottom: 25px;
            text-align: center;
            line-height: 1.6;
        }

        .notice strong {
            color: #e4c262;
            font-size: 19px;
        }


        /* =========================================
           SECTION CARDS
        ========================================= */

        .section-card {
            background: #fffdf7;
            border: 2px solid #ded7c5;
            border-radius: 28px;
            padding: 30px;
            margin-bottom: 28px;
            box-shadow: 0 7px 18px rgba(0,0,0,.04);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 25px;
        }

        .section-icon {
            width: 55px;
            height: 55px;
            background: #244d2c;
            color: white;
            border-radius: 14px;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 26px;
        }

        .section-title h2 {
            margin: 0;
            font-size: 29px;
        }


        /* =========================================
           CUSTOMER INFORMATION
        ========================================= */

        .field-label {
            display: block;
            font-weight: bold;
            margin: 20px 0 8px;
            font-size: 17px;
        }

        input[type="text"],
        input[type="tel"],
        input[type="email"],
        textarea {
            width: 100%;
            border: 2px solid #d8d1c0;
            border-radius: 18px;
            padding: 17px;
            font-size: 17px;
            background: white;
            color: #333;
        }

        textarea {
            min-height: 140px;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #4d833e;
        }


        /* =========================================
           RADIO CARD OPTIONS
        ========================================= */

        .option-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .radio-card input {
            display: none;
        }

        .radio-card label {
            display: flex;
            min-height: 145px;

            border: 3px solid #d8d1c0;
            border-radius: 22px;

            align-items: center;
            justify-content: center;

            text-align: center;
            padding: 18px;

            cursor: pointer;
            transition: .2s;

            background: white;
        }

        .radio-card label:hover {
            border-color: #60904f;
        }

        .radio-card input:checked + label {
            border-color: #244d2c;
            background: #edf6e4;
            box-shadow: 0 0 0 2px #244d2c;
        }

        .option-main {
            font-size: 27px;
            font-weight: bold;
            display: block;
            margin-bottom: 7px;
        }

        .option-sub {
            font-size: 15px;
            color: #73816a;
            display: block;
            line-height: 1.5;
        }

        .option-price {
            font-size: 23px;
            margin-top: 8px;
            display: block;
            color: #193a20;
            font-weight: bold;
        }


        /* =========================================
           JUICE LIST
        ========================================= */

        .juice-item {
            padding: 24px 0;
            border-bottom: 1px solid #d8d1c0;
        }

        .juice-item:last-child {
            border-bottom: none;
        }

        .juice-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            align-items: center;
        }

        .juice-info {
            flex: 1;
        }

        .juice-name {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 7px;
        }

        .juice-description {
            color: #6f7b68;
            line-height: 1.6;
            font-size: 15px;
        }

        .scripture {
            margin-top: 10px;
            padding: 11px 13px;

            background: #f0f5e9;
            border-left: 4px solid #b99638;
            border-radius: 8px;

            color: #4e6248;
            font-size: 14px;
            line-height: 1.5;
        }


        /* =========================================
           SOLD OUT
        ========================================= */

        .sold-out {
            opacity: .48;
        }

        .sold-badge {
            display: inline-block;

            background: #7c2929;
            color: white;

            border-radius: 100px;

            padding: 5px 11px;
            font-size: 11px;
            font-weight: bold;

            margin-left: 7px;
            letter-spacing: .5px;
        }

        .sold-controls {
            color: #999;
            font-weight: bold;
            white-space: nowrap;
            font-size: 14px;
        }


        /* =========================================
           QUANTITY BUTTONS
        ========================================= */

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .qty-button {
            width: 44px;
            height: 44px;

            border-radius: 50%;
            border: 2px solid #244d2c;

            background: white;
            color: #244d2c;

            font-size: 24px;
            cursor: pointer;

            transition: .2s;
        }

        .qty-button:hover {
            background: #244d2c;
            color: white;
        }

        .qty-number {
            min-width: 26px;
            text-align: center;
            font-size: 21px;
            font-weight: bold;
        }


        /* =========================================
           CUSTOM REQUEST
        ========================================= */

        .custom-request {
            background: #f1f7e8;
            border: 2px solid #60904f;
            border-radius: 22px;
            padding: 22px;
            margin-top: 28px;
        }

        .custom-request h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 22px;
        }

        .custom-request p {
            line-height: 1.6;
        }

        .custom-note {
            color: #62705b;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 0;
        }


        /* =========================================
           ORDER SUMMARY
        ========================================= */

        .summary {
            background: #244d2c;
            color: white;

            border-radius: 26px;
            padding: 28px;

            margin-bottom: 28px;
        }

        .summary h2 {
            margin-top: 0;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;

            padding: 11px 0;

            border-bottom:
                1px solid rgba(255,255,255,.25);
        }

        .summary-row:last-child {
            border-bottom: none;
        }

        .summary-total {
            font-size: 27px;
            font-weight: bold;
            color: #e4c262;
            padding-top: 16px;
        }


        /* =========================================
           PICKUP
        ========================================= */

        .pickup-option {
            display: block;

            border: 2px solid #d8d1c0;
            background: white;

            border-radius: 18px;

            padding: 18px;
            margin: 12px 0;

            cursor: pointer;
            line-height: 1.5;
        }

        .pickup-option input {
            margin-right: 10px;
            accent-color: #244d2c;
        }


        /* =========================================
